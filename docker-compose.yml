services:
  # The app itself. Behind the `app` profile because the recommended workflow runs
  # it on the host (`pnpm dev`) where localhost reaches the other services; only
  # enable this for a fully-containerized run (then switch .env hosts to service
  # names: mongo / ollama / stt / tts).
  payload:
    image: node:24-alpine
    profiles: ['app']
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    # Pin pnpm 10 — the repo's engines.pnpm is "^9 || ^10"; pnpm@latest (11) is refused.
    # Keep pnpm's content store inside the node_modules volume (not the bind-mounted
    # repo) so it isn't written back to the host as root, and persists across restarts.
    command: sh -c "corepack enable && corepack prepare pnpm@10 --activate && pnpm install --store-dir /home/node/app/node_modules/.pnpm-store && pnpm dev"
    depends_on:
      - mongo
      # - postgres
    env_file:
      - .env
    # Override the host-oriented localhost URLs from .env with compose service names,
    # so the app reaches the other containers when it runs INSIDE Docker.
    environment:
      # Let pnpm run non-interactively (auto-confirm a node_modules purge; no TTY here).
      - CI=true
      - DATABASE_URL=mongodb://mongo/payload-eve-chat
      - OLLAMA_BASE_URL=http://ollama:11434/api
      - STT_BASE_URL=http://stt:8000/v1
      - TTS_BASE_URL=http://tts:8880/v1

  # Ensure your DATABASE_URL uses 'mongo' as the hostname ie. mongodb://mongo/my-db-name
  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    command:
      - --storageEngine=wiredTiger
    volumes:
      - data:/data/db
    logging:
      driver: none

  stt:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    # No GPU? Swap to the CPU image and delete the `deploy:` block below:
    #   image: ghcr.io/speaches-ai/speaches:latest-cpu
    profiles: ['voice', 'full']
    ports:
      - '8000:8000'
    volumes:
      # STT models live in the repo at ./models/stt so they're portable/shareable.
      # speaches does NOT auto-download — see README to pull Systran/faster-whisper-small.
      - ./models/stt:/home/ubuntu/.cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  tts:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    # No GPU? Swap to the CPU image and delete the `deploy:` block below:
    #   image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    profiles: ['voice', 'full']
    ports:
      - '8880:8880'
    # The Kokoro model is baked into the image — no model folder/download needed.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Local LLM for AI_PROVIDER=ollama. Serves on :11434 and auto-pulls OLLAMA_MODEL
  # on first start. Runs as the host user with models under ./models/ollama so the
  # weights are portable and not root-owned.
  ollama:
    image: ollama/ollama:latest
    profiles: ['ollama', 'full']
    user: '1000:1000'
    environment:
      - HOME=/tmp
      - OLLAMA_MODELS=/models
    ports:
      - '11434:11434'
    volumes:
      - ./models/ollama:/models
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        ollama serve &
        pid=$$!
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull ${OLLAMA_MODEL:-qwen3:4b} || true
        wait $$pid
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Uncomment the following to use postgres
  # postgres:
  #   restart: always
  #   image: postgres:latest
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  data:
  # pgdata:
  node_modules:
