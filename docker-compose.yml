services:
  # The app itself. Behind the `app` profile because the recommended workflow runs
  # it on the host (`pnpm devsafe`) where localhost reaches the other services; only
  # enable this for a fully-containerized run (then switch .env hosts to service
  # names: mongo / stt / tts / searxng). NOTE: the Eve model runs via the Vercel AI
  # Gateway, so a containerized run also needs the gateway creds (GROQ_API_KEY and/or
  # VERCEL_OIDC_TOKEN) available in .env.
  payload:
    image: node:24-alpine
    profiles: ['app']
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    # Pin pnpm 10 — the repo's engines.pnpm is "^9 || ^10"; pnpm@latest (11) is refused.
    # Keep pnpm's content store inside the node_modules volume (not the bind-mounted
    # repo) so it isn't written back to the host as root, and persists across restarts.
    command: sh -c "corepack enable && corepack prepare pnpm@10 --activate && pnpm install --store-dir /home/node/app/node_modules/.pnpm-store && pnpm dev"
    depends_on:
      - mongo
      # - postgres
    env_file:
      - .env
    # Override the host-oriented localhost URLs from .env with compose service names,
    # so the app reaches the other containers when it runs INSIDE Docker.
    environment:
      # Let pnpm run non-interactively (auto-confirm a node_modules purge; no TTY here).
      - CI=true
      - DATABASE_URL=mongodb://mongo/payload-eve-chat
      # STT/TTS point at the voice containers; only used once voice is re-homed onto Eve
      # (deferred feature — see docs/eve-backlog.md A3).
      - STT_BASE_URL=http://stt:8000/v1
      - TTS_BASE_URL=http://tts:8880/v1

  # Ensure your DATABASE_URL uses 'mongo' as the hostname ie. mongodb://mongo/my-db-name
  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    command:
      - --storageEngine=wiredTiger
    volumes:
      - data:/data/db
    logging:
      driver: none

  # stt + tts back the DEFERRED voice feature (Eve port pending — docs/eve-backlog.md A3;
  # the live voice implementation is on the `ai-sdk` branch). Profile: voice / full.
  stt:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    # No GPU? Swap to the CPU image and delete the `deploy:` block below:
    #   image: ghcr.io/speaches-ai/speaches:latest-cpu
    profiles: ['voice', 'full']
    ports:
      - '8000:8000'
    volumes:
      # STT models live in the repo at ./models/stt so they're portable/shareable.
      # speaches does NOT auto-download — see README to pull Systran/faster-whisper-small.
      - ./models/stt:/home/ubuntu/.cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  tts:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    # No GPU? Swap to the CPU image and delete the `deploy:` block below:
    #   image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    profiles: ['voice', 'full']
    ports:
      - '8880:8880'
    # The Kokoro model is baked into the image — no model folder/download needed.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # NOTE: no `ollama` service — the Eve agent's model runs through the Vercel AI Gateway
  # (default openai/gpt-oss-120b via groq), not a local Ollama. The Ollama service for
  # AI_PROVIDER=ollama lives on the `ai-sdk` branch.

  # searxng backs the DEFERRED web-search feature (Eve port pending — docs/eve-backlog.md
  # A2; the live implementation is on the `ai-sdk` branch). Profile: web / full.
  searxng:
    image: searxng/searxng:latest
    profiles: ['web', 'full']
    ports:
      # Bind to loopback only — it's reached by the app on the host at
      # localhost:8080; don't expose an open search proxy on the LAN.
      - '127.0.0.1:8080:8080'
    volumes:
      - ./searxng:/etc/searxng:ro
    environment:
      # Local-dev default; set SEARXNG_SECRET in .env to a random value for any
      # non-localhost deployment (the instance is loopback-bound above).
      - SEARXNG_SECRET=${SEARXNG_SECRET:-please-change-this-local-secret}

  # Uncomment the following to use postgres
  # postgres:
  #   restart: always
  #   image: postgres:latest
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  data:
  # pgdata:
  node_modules:
